name: Run tests on MySQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests-mysql-linux:
    uses: ./.github/workflows/tests-mysql-linux.yml
    with:
      mysql: "8.4"
      python-versions: '["3.10", "3.11", "3.12", "3.13", "3.14", "pypy-3.11"]'
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  tests-mysql-linux_8:
    needs: [ tests-mysql-linux ]
    uses: ./.github/workflows/tests-mysql-linux.yml
    with:
      mysql: "8.0"
      python-versions: '["3.12", "3.13", "3.14"]'
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  tests-mariadb-linux-11:
    needs: [ tests-mysql-linux ]
    uses: ./.github/workflows/tests-mariadb-linux.yml
    with:
      mariadb: "11.4"
      python-versions: '["3.12", "3.13", "3.14"]'
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  tests-mariadb-linux-10_11:
    needs: [ tests-mariadb-linux-11 ]
    uses: ./.github/workflows/tests-mariadb-linux.yml
    with:
      mariadb: 10.11
      python-versions: '["3.13", "3.14"]'
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  tests-mysql-macosx:
    runs-on: macos-latest
    needs: [tests-mysql-linux]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    env:
      OS: macos-latest
      PYTHON: ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v6
    - uses: ankane/setup-mysql@v1
      with:
        mysql-version: 8.4
    - name: Check MySQL Version
      run: mysqld --version
    - name: Run test
      id: run_serial_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv@v4.4.5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        command: python -m coverage run --data-file=.coverage.serial -m pytest -n 0 -k "not mysqlnoproc" --mysql-user=root --basetemp=/tmp/pytest_mysql
        cache: false
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.serial"}'
    - name: Combine and export serial coverage
      if: ${{ always() && (steps.run_serial_tests.conclusion == 'success' || steps.run_serial_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.5
      with:
        data-file: .coverage.serial
        output-file: coverage-serial.xml
    - name: Upload coverage to Codecov
      if: ${{ always() }}
      uses: codecov/codecov-action@v6.0.0
      with:
        files: coverage-serial.xml
        flags: macos,mysql
        env_vars: OS,PYTHON
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  tests-mariadb-macosx:
    runs-on: macos-latest
    needs: [tests-mysql-macosx, tests-mariadb-linux-11]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    env:
      OS: macos-latest
      PYTHON: ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v6
    - uses: ankane/setup-mariadb@v1
      with:
        mariadb-version: "11.4"
    - name: Check MySQL Version
      run: mysqld --version
    - name: Run test
      id: run_serial_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv@v4.4.5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        command: python -m coverage run --data-file=.coverage.serial -m pytest --mysql-user=$USER -n 0 -k "not mysqlnoproc" --basetemp=/tmp/pytest_mysql
        cache: false
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.serial"}'
    - name: Combine and export serial coverage
      if: ${{ always() && (steps.run_serial_tests.conclusion == 'success' || steps.run_serial_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.5
      with:
        data-file: .coverage.serial
        output-file: coverage-serial.xml
    - name: Upload coverage to Codecov
      if: ${{ always() }}
      uses: codecov/codecov-action@v6.0.0
      with:
        files: coverage-serial.xml
        flags: macos,mariadb
        env_vars: OS,PYTHON
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

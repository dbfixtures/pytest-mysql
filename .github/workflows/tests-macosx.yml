name: Run pytest tests tests on macos

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'Supported python versions'
        default: '["3.13", "3.14"]'
        required: false
        type: string
    secrets:
      codecov_token:
        description: 'Codecov token'
        required: false

jobs:
  mysql:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    env:
      OS: macos-latest
      PYTHON: ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v6
    - uses: ankane/setup-mysql@v1
      with:
        mysql-version: 8.4
    - name: Check MySQL Version
      run: mysqld --version
    - name: Run test
      id: run_serial_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv@v4.4.6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        command: python -m coverage run --data-file=.coverage.serial -m pytest -p no:xdist -k "not mysqlnoproc" --mysql-user=root --basetemp=/tmp/pytest_mysql
        cache: false
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.serial"}'
    - name: Combine and export serial coverage
      if: ${{ always() && (steps.run_serial_tests.conclusion == 'success' || steps.run_serial_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.6
      with:
        data-file: .coverage.serial
        output-file: coverage-serial.xml
    - name: Upload coverage to Codecov
      if: ${{ always() }}
      uses: codecov/codecov-action@v6.0.0
      with:
        files: coverage-serial.xml
        flags: macos,mysql
        env_vars: OS,PYTHON
        fail_ci_if_error: false
        token: ${{ secrets.codecov_token }}

  mariadb:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    env:
      OS: macos-latest
      PYTHON: ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v6
    - uses: ankane/setup-mariadb@v1
      with:
        mariadb-version: "11.4"
    - name: Check MySQL Version
      run: mysqld --version
    - name: Run test
      id: run_serial_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv@v4.4.6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        command: python -m coverage run --data-file=.coverage.serial -m pytest --mysql-user=$USER -p no:xdist -k "not mysqlnoproc" --basetemp=/tmp/pytest_mysql
        cache: false
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.serial"}'
    - name: Combine and export serial coverage
      if: ${{ always() && (steps.run_serial_tests.conclusion == 'success' || steps.run_serial_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.6
      with:
        data-file: .coverage.serial
        output-file: coverage-serial.xml
    - name: Upload coverage to Codecov
      if: ${{ always() }}
      uses: codecov/codecov-action@v6.0.0
      with:
        files: coverage-serial.xml
        flags: macos,mariadb
        env_vars: OS,PYTHON
        fail_ci_if_error: false
        token: ${{ secrets.codecov_token }}

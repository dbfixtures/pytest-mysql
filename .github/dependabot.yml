version: 2
updates:
- package-ecosystem: pip
  directories:
    - "/"
  exclude-paths:
    - "oldest/*"
  schedule:
    interval: daily
    time: "05:00"
  open-pull-requests-limit: 1
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: "06:10"
  open-pull-requests-limit: 2
